name: Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: '17 10 * * *'

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  targeted:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - run: bun ci

      - name: Run targeted benchmarks
        run: |
          mkdir -p benchmark-results
          bun fixtures/benchmarks/run.ts --scenario read-full-dense --repeat 3 --warmup 1 --json > benchmark-results/read-full-dense.json
          bun fixtures/benchmarks/run.ts --scenario write-dense-40k --repeat 3 --warmup 1 --json > benchmark-results/write-dense-40k.json
          bun fixtures/benchmarks/run.ts --scenario recalc-formula-chain --repeat 3 --warmup 1 --json > benchmark-results/recalc-formula-chain.json
          bun fixtures/benchmarks/run.ts --scenario memory-100k-cells --repeat 3 --warmup 1 --json > benchmark-results/memory-100k-cells.json

      - name: Print benchmark summary
        run: |
          bun -e 'const fs = require("node:fs"); const files = fs.readdirSync("benchmark-results").filter((f) => f.endsWith(".json")).sort(); for (const file of files) { const result = JSON.parse(fs.readFileSync(`benchmark-results/${file}`, "utf8")); const metrics = result.metrics; const throughput = metrics.throughputPerSec == null ? "n/a" : `${Math.round(metrics.throughputPerSec).toLocaleString()}/s`; const heap = metrics.heapDeltaBytes == null ? "n/a" : `${Math.round(metrics.heapDeltaBytes / 1024 / 1024 * 100) / 100} MB`; console.log(`${result.name}: median=${metrics.medianMs.toFixed(2)}ms p95=${metrics.p95Ms.toFixed(2)}ms throughput=${throughput} heapDelta=${heap}`); }'

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: targeted-benchmarks-${{ github.sha }}
          path: benchmark-results/*.json
