name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Lint and format
        run: bunx biome ci

      - name: Typecheck
        run: bunx tsc --build

      - name: Build JS packages
        run: bun run build:js

      - name: Test
        run: bun test --recursive

      - name: Coverage
        run: bun run test:coverage

      - name: Coverage audit
        run: bun run coverage:audit

      - name: Generate TypeDoc
        run: bun run docs:sdk

      - name: Upload SDK docs
        uses: actions/upload-artifact@v4
        with:
          name: sdk-docs-${{ github.sha }}
          path: dist/docs/sdk-api

  perf-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Synthetic benchmark smoke
        run: bun run fixtures/benchmarks/run.ts --set smoke --repeat 3 --ci > benchmark-results.json

      - name: Validate throughput targets
        run: bun run fixtures/benchmarks/check-targets.ts benchmark-results.json --min-ratio 0.75 --scope category

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmark-results.json
