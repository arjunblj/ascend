openapi: 3.0.3
info:
  title: Ascend HTTP API
  version: 0.0.0
  description: |
    Reference server in `apps/api`. All POST bodies are JSON. File fields are **local paths** on the server host.
servers:
  - url: http://localhost:3000
paths:
  /health:
    get:
      summary: Liveness
      responses:
        '200':
          description: OK
  /operations:
    get:
      summary: List canonical operation schemas and embedded examples
      responses:
        '200': { description: Operation catalog envelope }
  /capabilities:
    get:
      summary: List Excel capability coverage, OSS baselines, gaps, and milestones
      parameters:
        - { name: feature, in: query, schema: { type: string } }
        - { name: family, in: query, schema: { type: string } }
        - { name: priority, in: query, schema: { enum: [P0, P1, P2, P3] } }
        - { name: status, in: query, schema: { enum: [excel-equivalent, editable, inspectable, preserved, unsafe-blocked, unsupported] } }
        - { name: gaps, in: query, schema: { type: boolean } }
      responses:
        '200': { description: Capability registry envelope }
  /inspect:
    post:
      summary: Inspect workbook or single sheet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
                sheet: { type: string }
      responses:
        '200': { description: Workbook or sheet inspect payload }
  /open-plan:
    post:
      summary: Recommend a safe XLSX/XLSM open mode before workbook hydration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
                intent:
                  enum: [risk-inventory, read-values, formula-analysis, edit-plan]
                  description: Caller intent for the next step; defaults to edit-plan.
                password:
                  type: string
                  description: Password for encrypted XLSX/XLSM workbooks; never echoed in responses.
      responses:
        '200': { description: Open-plan recommendation with reasons, risk features, and recommended load options }
  /active-content:
    post:
      summary: Inspect macros, signatures, ActiveX/form controls, Custom UI callbacks, and related preserve-first risks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
      responses:
        '200': { description: Active-content inventory with capability warnings }
  /trust-report:
    post:
      summary: Inspect untrusted workbook posture for agent-safe context boundaries and safe next actions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
                maxFindings:
                  type: integer
                  minimum: 0
                  description: Maximum findings to emit; summary still reports truncation.
            examples:
              untrustedWorkbook:
                value:
                  file: vendor-model.xlsx
                  maxFindings: 50
      responses:
        '200':
          description: Workbook trust report with context defaults, execution policy, findings, and next actions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustReportSuccessEnvelope'
  /package-graph:
    post:
      summary: Inspect XLSX/XLSM package parts, relationships, content types, and preservation policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
      responses:
        '200': { description: Package graph and preservation policy payload }
  /raw-part:
    post:
      summary: Read a bounded raw XLSX/XLSM package part for diagnostics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file, partPath]
              properties:
                file: { type: string }
                partPath: { type: string }
                encoding: { enum: [text, base64, none] }
                maxBytes: { type: integer, minimum: 0, maximum: 1048576 }
                caseInsensitiveFallback: { type: boolean }
      responses:
        '200': { description: Bounded raw package part payload with hash, truncation, and origin metadata }
  /visuals:
    post:
      summary: Inspect workbook visuals, charts, images, drawings, slicers, timelines, and related package features
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
      responses:
        '200': { description: Visual inventory payload }
  /dump:
    post:
      summary: Dump supported workbook cells and formulas as deterministic replayable operations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
                sheet: { type: string }
                valuesOnly: { type: boolean }
                formulasOnly: { type: boolean }
      responses:
        '200': { description: Replayable operation batch or unresolved unsupported-cell details }
  /template-merge:
    post:
      summary: Compile template placeholders into replayable operations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file, data]
              properties:
                file: { type: string }
                data: { type: object, additionalProperties: true }
                sheet: { type: string }
                valuesOnly: { type: boolean }
                formulasOnly: { type: boolean }
                open: { type: string }
                close: { type: string }
      responses:
        '200': { description: Template merge operation batch with unresolved placeholder details }
  /pivots:
    post:
      summary: Inspect PivotTables, caches, saved-output audits, refresh plans, and materialization ops
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
                pivotTable: { type: string }
                partPath: { type: string }
                mode: { enum: [missing, mismatches, all] }
      responses:
        '200': { description: Pivot inventory, output audits, refresh plans, and optional materialization plan }
  /read:
    post:
      summary: Read a range
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file, range]
              properties:
                file: { type: string }
                sheet: { type: string }
                range: { type: string }
                format: { enum: [cells, rows, objects, compact] }
                display: { type: boolean }
                headers: { type: array, items: { type: string } }
                rowOffset: { type: integer }
                rowLimit: { type: integer }
                maxRows: { type: integer }
                preview: { type: boolean }
                changedSince: { type: string, description: Compact-read change token from a prior response }
      responses:
        '200':
          description: Range payload. Compact responses include changeToken and may include changeInvalidation when the requested patch cannot be applied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadSuccessEnvelope'
  /agent-view:
    post:
      summary: Read a compact semantic summary for an agent workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file, range]
              properties:
                file: { type: string }
                sheet: { type: string }
                range: { type: string }
                rowChunkSize: { type: integer }
                sampleRowLimit: { type: integer }
                sampleValueLimit: { type: integer }
                maxApproxTokens: { type: integer }
      responses:
        '200': { description: Agent-oriented range profile }
  /formula-assist:
    post:
      summary: Formula IDE assistance without writing a workbook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormulaAssistRequest'
            examples:
              repairFormula:
                value:
                  formula: '=SUM(A1:B2'
                  cursor: 8
                  prefix: SU
                  completionLimit: 5
                  functionName: SUM
                  cycleReference: true
      responses:
        '200':
          description: Formula diagnostics, token ranges, completions, signature help, and optional reference edit previews
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormulaAssistSuccessEnvelope'
  /write:
    post:
      summary: Apply operations or path-addressed mutations and save (implementation-specific)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              oneOf:
                - required: [ops]
                - required: [mutations]
              properties:
                file: { type: string }
                ops: { type: array }
                mutations: { type: array, description: Path-addressed mutations; mutually exclusive with ops }
      responses:
        '200': { description: Success envelope }
  /preview:
    post:
      summary: Preview operations or path-addressed mutations without saving
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              oneOf:
                - required: [ops]
                - required: [mutations]
              properties:
                file: { type: string }
                ops: { type: array }
                mutations: { type: array, description: Path-addressed mutations; mutually exclusive with ops }
      responses:
        '200': { description: Diff, warnings, and recalc scope preview }
  /plan:
    post:
      summary: Validate, preview, recalc-audit, and preservation-audit operations without saving
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanRequest'
            examples:
              operationPlan:
                value:
                  file: model.xlsx
                  ops:
                    - op: setFormula
                      sheet: Revenue
                      ref: H2
                      formula: '=SUM(B2:G2)'
                  compact: true
              pathMutationPlan:
                value:
                  file: model.xlsx
                  mutations:
                    - path: /sheets/Revenue/cells/H2/formula
                      value: '=SUM(B2:G2)'
                  compact: true
      responses:
        '200':
          description: Agent plan with input hash, digest, preview, check, lint, preservation summary, and optional preparedPlan metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanSuccessEnvelope'
  /commit:
    post:
      summary: Commit operations atomically with optional input hash guard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitRequest'
            examples:
              preparedCommit:
                value:
                  planHandle: plan_abc123
                  output: model.updated.xlsx
                  compact: true
              guardedDirectCommit:
                value:
                  file: model.xlsx
                  ops:
                    - op: setFormula
                      sheet: Revenue
                      ref: H2
                      formula: '=SUM(B2:G2)'
                  output: model.updated.xlsx
                  expectSha256: 614cf9e96dc353cac45028ce4cc02e7722056b7c02fbf5920566c7572f53900d
      responses:
        '200':
          description: Commit result with input/output hashes and plan digest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitSuccessEnvelope'
  /repair-plan:
    post:
      summary: Suggest safe next actions when check, lint, or unsupported-feature audits need attention
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
      responses:
        '200':
          description: Repair action list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepairPlanSuccessEnvelope'
  /calc:
    post:
      summary: Recalculate workbook
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
                range: { type: string, description: Optional range-scoped recalculation target }
      responses:
        '200': { description: Recalc result }
  /check:
    post:
      summary: Structural check
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
                maxRows: { type: integer }
      responses:
        '200': { description: Check result }
  /lint:
    post:
      summary: Formula lint
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
                maxRows: { type: integer }
      responses:
        '200': { description: Lint result }
  /trace:
    post:
      summary: Trace precedents / dependents
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [file, cell]
              properties:
                file: { type: string }
                cell: { type: string }
                maxRows: { type: integer }
      responses:
        '200': { description: Trace result }
  /diff:
    post:
      summary: Diff two workbooks
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [fileA, fileB]
              properties:
                fileA: { type: string }
                fileB: { type: string }
      responses:
        '200': { description: Diff result }
  /export:
    post:
      summary: Export bytes
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [file, format]
              properties:
                file: { type: string }
                format: { type: string }
      responses:
        '200': { description: Binary or JSON depending on format }
components:
  schemas:
    MachineSuccess:
      type: object
      required: [ok, version, data]
      properties:
        ok: { type: boolean, enum: [true] }
        version: { type: string }
        data: { type: object, additionalProperties: true }
    MachineFailure:
      type: object
      required: [ok, version, error]
      properties:
        ok: { type: boolean, enum: [false] }
        version: { type: string }
        error:
          oneOf:
            - { type: string }
            - $ref: '#/components/schemas/AscendError'
    AscendError:
      type: object
      required: [code, message]
      properties:
        code: { type: string, description: Machine-readable error code }
        message: { type: string, description: Human-readable workbook concept and failure reason }
        refs: { type: array, items: { type: string } }
        details: { type: object, additionalProperties: true }
        retry: { type: string, description: Retry strategy when known }
        suggestedFix: { type: string, description: Next action for agents or humans }
    Operation:
      type: object
      required: [op]
      properties:
        op: { type: string }
      additionalProperties: true
      description: Canonical operation from GET /operations.
    PathMutation:
      type: object
      required: [path]
      properties:
        path:
          oneOf:
            - { type: string, example: /sheets/Revenue/cells/H2/formula }
            - { type: array, items: { type: string }, example: [sheets, Revenue, cells, H2, formula] }
        value:
          description: New value for path-addressed set/replace operations.
        op:
          type: string
          description: Optional JSON Patch-style verb when supported by a path shape.
      additionalProperties: true
    AgentEditInput:
      type: object
      oneOf:
        - required: [ops]
        - required: [mutations]
      properties:
        ops:
          type: array
          items:
            $ref: '#/components/schemas/Operation'
          description: Canonical operations; mutually exclusive with mutations.
        mutations:
          type: array
          items:
            $ref: '#/components/schemas/PathMutation'
          description: Path-addressed mutations compiled against the workbook; mutually exclusive with ops.
    Approval:
      type: object
      required: [id, code, message]
      properties:
        id: { type: string }
        code: { type: string }
        message: { type: string }
        refs: { type: array, items: { type: string } }
        details: { type: object, additionalProperties: true }
    PreparedPlan:
      type: object
      required: [id, file, inputSha256, planDigest, operationCount, expiresAt, ttlMs]
      properties:
        id: { type: string, description: Process-local one-shot plan handle }
        file: { type: string }
        inputSha256: { type: string }
        planDigest: { type: string }
        operationCount: { type: integer }
        expiresAt: { type: string, format: date-time }
        ttlMs: { type: integer }
    LossAudit:
      type: object
      properties:
        ok: { type: boolean }
        blockedFeatures: { type: array, items: { type: object, additionalProperties: true } }
        blockedPackageParts: { type: array, items: { type: object, additionalProperties: true } }
        approvals: { type: array, items: { $ref: '#/components/schemas/Approval' } }
      additionalProperties: true
    TrustReportFinding:
      type: object
      required: [code, severity, category, message, nextAction]
      properties:
        code:
          type: string
          description: Stable machine-readable workbook trust finding code.
          example: workbook.vbaProject
        severity:
          type: string
          enum: [info, warning, blocked]
        category:
          type: string
          enum:
            - active-content
            - agent-context
            - csv-injection
            - external-content
            - hidden-content
            - package
            - prompt-injection
        message:
          type: string
          description: Human-readable workbook concept and why it matters.
        location:
          type: object
          additionalProperties: true
          description: Sheet/ref/package relationship provenance when available.
        nextAction:
          type: string
          description: Safe follow-up action for a coding agent or human reviewer.
    TrustReportResponse:
      type: object
      required:
        - formatVersion
        - trust
        - posture
        - includedInAgentContext
        - executionPolicy
        - workbook
        - summary
        - findings
        - nextActions
        - load
      properties:
        formatVersion: { type: integer, enum: [1] }
        trust:
          type: string
          enum: [untrusted]
          description: Workbook content is treated as untrusted input, not instructions.
        posture:
          type: string
          enum: [safe-parser-preserver]
          description: Ascend parses and preserves workbook content without executing active content or refreshing external content.
        includedInAgentContext:
          type: object
          additionalProperties: true
          description: Which workbook content classes are included in default agent context.
        executionPolicy:
          type: object
          additionalProperties: true
          description: Execution/refresh policy for macros, ActiveX/OLE, DDE, external links, connections, and formulas.
        workbook:
          type: object
          additionalProperties: true
          description: Workbook-level counts and format facts relevant to trust review.
        summary:
          type: object
          additionalProperties: true
          description: Finding counts by severity/category plus truncation metadata.
        findings:
          type: array
          items:
            $ref: '#/components/schemas/TrustReportFinding'
        nextActions:
          type: array
          items: { type: string }
        load:
          type: object
          additionalProperties: true
          description: Load mode used to inspect the workbook.
      additionalProperties: true
    PlanRequest:
      allOf:
        - type: object
          required: [file]
          properties:
            file: { type: string }
            password:
              type: string
              description: Password for encrypted source workbooks; never echoed in responses.
            compact: { type: boolean }
            prepare: { type: boolean, description: Defaults to true and returns a preparedPlan handle }
            includePackageActions:
              type: boolean
              description: Include package part action proof evidence with passthrough/regenerate/add/drop/error counts.
            maxChangedCells:
              type: integer
              description: Compact response emitted changed-cell cap; total counts are still reported.
        - $ref: '#/components/schemas/AgentEditInput'
    CommitRequest:
      type: object
      oneOf:
        - required: [planHandle]
        - required: [file, ops]
        - required: [file, mutations]
      properties:
        planHandle: { type: string, description: One-shot prepared plan handle returned by /plan }
        file: { type: string }
        password:
          type: string
          description: Password for encrypted source workbooks when committing without a prepared handle; never echoed in responses.
        ops:
          type: array
          items:
            $ref: '#/components/schemas/Operation'
        mutations:
          type: array
          items:
            $ref: '#/components/schemas/PathMutation'
        output: { type: string, description: Non-destructive output path }
        inPlace: { type: boolean, description: Replace the input file atomically }
        backup: { type: string, description: Backup path for in-place commits }
        expectSha256: { type: string, description: Reject stale input bytes }
        allowLoss:
          oneOf:
            - { type: string }
            - { type: array, items: { type: string } }
          description: Feature keys, feature:tier keys, generated loss approval IDs, comma-separated string, string array, or "all" after explicit user approval.
        approvals:
          oneOf:
            - { type: string }
            - { type: array, items: { type: string } }
          description: Exact approval IDs from plan, comma-separated string, array, or "all".
        compact: { type: boolean }
        includePackageActions:
          type: boolean
          description: Include package part action proof evidence with passthrough/regenerate/add/drop/error counts.
        maxAffectedCells:
          type: integer
          description: Compact response emitted affected-cell cap; total counts are still reported.
    PlanResponse:
      type: object
      required: [inputSha256, planDigest, operationCount, preview, check, lint, approvals, modelOutput]
      properties:
        inputSha256: { type: string }
        planDigest: { type: string }
        operationCount: { type: integer }
        preview:
          type: object
          required: [wouldSucceed]
          properties:
            wouldSucceed: { type: boolean }
            cellChanges: { type: array, items: { type: object, additionalProperties: true } }
            errors: { type: array, items: { $ref: '#/components/schemas/AscendError' } }
          additionalProperties: true
        check: { type: object, additionalProperties: true }
        lint: { type: object, additionalProperties: true }
        lossAudit: { $ref: '#/components/schemas/LossAudit' }
        approvals: { type: array, items: { $ref: '#/components/schemas/Approval' } }
        preparedPlan: { $ref: '#/components/schemas/PreparedPlan' }
        pathMutations: { type: object, additionalProperties: true }
        modelOutput:
          type: object
          properties:
            nextActions: { type: array, items: { type: string } }
          additionalProperties: true
      additionalProperties: true
    CommitResponse:
      type: object
      required: [inputSha256, outputSha256, planDigest, operationCount, postWrite]
      properties:
        inputSha256: { type: string }
        outputSha256: { type: string }
        output: { type: string }
        backup: { type: string }
        planDigest: { type: string }
        operationCount: { type: integer }
        postWrite:
          type: object
          properties:
            valid: { type: boolean }
            auditsPassed: { type: boolean }
            check: { type: object, additionalProperties: true }
            lint: { type: object, additionalProperties: true }
          additionalProperties: true
        pathMutations: { type: object, additionalProperties: true }
      additionalProperties: true
    RepairPlanResponse:
      type: object
      required: [actions]
      properties:
        actions:
          type: array
          items:
            type: object
            properties:
              code: { type: string }
              title: { type: string }
              reason: { type: string }
              command: { type: string }
            additionalProperties: true
      additionalProperties: true
    CompactReadResponse:
      type: object
      required: [changeToken, cells]
      properties:
        changeToken: { type: string }
        cells: { type: array, items: { type: object, additionalProperties: true } }
        changeInvalidation:
          type: object
          properties:
            code: { type: string }
            reason: { type: string }
          additionalProperties: true
      additionalProperties: true
    FormulaAssistRequest:
      type: object
      required: [formula]
      properties:
        formula: { type: string, description: Formula text with or without a leading "=" }
        cursor: { type: integer, minimum: 0, description: Zero-based cursor offset }
        prefix: { type: string, description: Function completion prefix }
        completionLimit: { type: integer, minimum: 0, maximum: 100 }
        functionName: { type: string, description: Function name for signature lookup }
        reference: { type: string, description: Reference text to insert at cursor }
        replaceReferenceAtCursor: { type: boolean }
        cycleReference: { type: boolean, description: Return F4-style reference cycling result }
    FormulaAssistResponse:
      type: object
      required: [formula, cursor, diagnostics, tokens, activeReference, completions, signature, signatureHelp, cycle, insertion]
      properties:
        formula: { type: string }
        cursor: { type: integer, nullable: true }
        diagnostics:
          type: object
          properties:
            parseOk: { type: boolean }
            diagnostics: { type: array, items: { type: object, additionalProperties: true } }
        tokens: { type: array, items: { type: object, additionalProperties: true } }
        activeReference: { type: object, nullable: true, additionalProperties: true }
        completions: { type: array, items: { type: object, additionalProperties: true } }
        signature: { type: object, nullable: true, additionalProperties: true }
        signatureHelp: { type: object, nullable: true, additionalProperties: true }
        cycle: { type: object, nullable: true, additionalProperties: true }
        insertion: { type: object, nullable: true, additionalProperties: true }
    PlanSuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/MachineSuccess'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PlanResponse'
    CommitSuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/MachineSuccess'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/CommitResponse'
    RepairPlanSuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/MachineSuccess'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/RepairPlanResponse'
    TrustReportSuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/MachineSuccess'
