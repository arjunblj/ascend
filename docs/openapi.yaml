openapi: 3.0.3
info:
  title: Ascend HTTP API
  version: 0.0.0
  description: |
    Reference server in `apps/api`. All POST bodies are JSON. File fields are **local paths** on the server host.
servers:
  - url: http://localhost:3000
paths:
  /health:
    get:
      summary: Liveness
      responses:
        '200':
          description: OK
  /operations:
    get:
      summary: List canonical operation schemas and embedded examples
      responses:
        '200': { description: Operation catalog envelope }
  /capabilities:
    get:
      summary: List Excel capability coverage, OSS baselines, gaps, and milestones
      parameters:
        - { name: feature, in: query, schema: { type: string } }
        - { name: family, in: query, schema: { type: string } }
        - { name: priority, in: query, schema: { enum: [P0, P1, P2, P3] } }
        - { name: status, in: query, schema: { enum: [excel-equivalent, editable, inspectable, preserved, unsafe-blocked, unsupported] } }
        - { name: gaps, in: query, schema: { type: boolean } }
      responses:
        '200': { description: Capability registry envelope }
  /inspect:
    post:
      summary: Inspect workbook or single sheet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
                sheet: { type: string }
      responses:
        '200': { description: Workbook or sheet inspect payload }
  /active-content:
    post:
      summary: Inspect macros, signatures, ActiveX/form controls, Custom UI callbacks, and related preserve-first risks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
      responses:
        '200': { description: Active-content inventory with capability warnings }
  /package-graph:
    post:
      summary: Inspect XLSX/XLSM package parts, relationships, content types, and preservation policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
      responses:
        '200': { description: Package graph and preservation policy payload }
  /raw-part:
    post:
      summary: Read a bounded raw XLSX/XLSM package part for diagnostics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file, partPath]
              properties:
                file: { type: string }
                partPath: { type: string }
                encoding: { enum: [text, base64, none] }
                maxBytes: { type: integer, minimum: 0, maximum: 1048576 }
                caseInsensitiveFallback: { type: boolean }
      responses:
        '200': { description: Bounded raw package part payload with hash, truncation, and origin metadata }
  /visuals:
    post:
      summary: Inspect workbook visuals, charts, images, drawings, slicers, timelines, and related package features
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
      responses:
        '200': { description: Visual inventory payload }
  /dump:
    post:
      summary: Dump supported workbook cells and formulas as deterministic replayable operations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
                sheet: { type: string }
                valuesOnly: { type: boolean }
                formulasOnly: { type: boolean }
      responses:
        '200': { description: Replayable operation batch or unresolved unsupported-cell details }
  /template-merge:
    post:
      summary: Compile template placeholders into replayable operations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file, data]
              properties:
                file: { type: string }
                data: { type: object, additionalProperties: true }
                sheet: { type: string }
                valuesOnly: { type: boolean }
                formulasOnly: { type: boolean }
                open: { type: string }
                close: { type: string }
      responses:
        '200': { description: Template merge operation batch with unresolved placeholder details }
  /pivots:
    post:
      summary: Inspect PivotTables, caches, saved-output audits, refresh plans, and materialization ops
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
                pivotTable: { type: string }
                partPath: { type: string }
                mode: { enum: [missing, mismatches, all] }
      responses:
        '200': { description: Pivot inventory, output audits, refresh plans, and optional materialization plan }
  /read:
    post:
      summary: Read a range
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file, range]
              properties:
                file: { type: string }
                sheet: { type: string }
                range: { type: string }
                format: { enum: [cells, rows, objects, compact] }
                display: { type: boolean }
                headers: { type: array, items: { type: string } }
                rowOffset: { type: integer }
                rowLimit: { type: integer }
                maxRows: { type: integer }
                preview: { type: boolean }
                changedSince: { type: string, description: Compact-read change token from a prior response }
      responses:
        '200': { description: Range payload. Compact responses include changeToken and may include changeInvalidation when the requested patch cannot be applied. }
  /agent-view:
    post:
      summary: Read a compact semantic summary for an agent workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file, range]
              properties:
                file: { type: string }
                sheet: { type: string }
                range: { type: string }
                rowChunkSize: { type: integer }
                sampleRowLimit: { type: integer }
                sampleValueLimit: { type: integer }
      responses:
        '200': { description: Agent-oriented range profile }
  /write:
    post:
      summary: Apply operations or path-addressed mutations and save (implementation-specific)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              oneOf:
                - required: [ops]
                - required: [mutations]
              properties:
                file: { type: string }
                ops: { type: array }
                mutations: { type: array, description: Path-addressed mutations; mutually exclusive with ops }
      responses:
        '200': { description: Success envelope }
  /preview:
    post:
      summary: Preview operations or path-addressed mutations without saving
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              oneOf:
                - required: [ops]
                - required: [mutations]
              properties:
                file: { type: string }
                ops: { type: array }
                mutations: { type: array, description: Path-addressed mutations; mutually exclusive with ops }
      responses:
        '200': { description: Diff, warnings, and recalc scope preview }
  /plan:
    post:
      summary: Validate, preview, recalc-audit, and preservation-audit operations without saving
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              oneOf:
                - required: [ops]
                - required: [mutations]
              properties:
                file: { type: string }
                ops: { type: array }
                mutations: { type: array, description: Path-addressed mutations; mutually exclusive with ops }
                compact: { type: boolean }
                prepare: { type: boolean, description: Defaults to true and returns a preparedPlan handle }
                maxChangedCells: { type: integer, description: Compact response emitted changed-cell cap; total counts are still reported }
      responses:
        '200': { description: Agent plan with input hash, digest, preview, check, lint, preservation summary, and optional preparedPlan metadata }
  /commit:
    post:
      summary: Commit operations atomically with optional input hash guard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              oneOf:
                - required: [planHandle]
                - required: [file, ops]
                - required: [file, mutations]
              properties:
                planHandle: { type: string, description: One-shot prepared plan handle returned by /plan }
                file: { type: string }
                ops: { type: array }
                mutations: { type: array, description: Path-addressed mutations; mutually exclusive with ops }
                output: { type: string }
                inPlace: { type: boolean }
                backup: { type: string }
                expectSha256: { type: string }
                allowLoss:
                  oneOf:
                    - { type: string }
                    - { type: array, items: { type: string } }
                  description: Feature keys, feature:tier keys, generated loss approval IDs, comma-separated string, string array, or "all" after explicit user approval
                approvals:
                  oneOf:
                    - { type: string }
                    - { type: array, items: { type: string } }
                  description: Exact approval IDs from plan, comma-separated string, array, or "all"
                compact: { type: boolean }
                maxAffectedCells: { type: integer, description: Compact response emitted affected-cell cap; total counts are still reported }
      responses:
        '200': { description: Commit result with input/output hashes and plan digest }
  /repair-plan:
    post:
      summary: Suggest safe next actions when check, lint, or unsupported-feature audits need attention
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
      responses:
        '200': { description: Repair action list }
  /calc:
    post:
      summary: Recalculate workbook
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
                range: { type: string, description: Optional range-scoped recalculation target }
      responses:
        '200': { description: Recalc result }
  /check:
    post:
      summary: Structural check
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
                maxRows: { type: integer }
      responses:
        '200': { description: Check result }
  /lint:
    post:
      summary: Formula lint
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string }
                maxRows: { type: integer }
      responses:
        '200': { description: Lint result }
  /trace:
    post:
      summary: Trace precedents / dependents
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [file, cell]
              properties:
                file: { type: string }
                cell: { type: string }
                maxRows: { type: integer }
      responses:
        '200': { description: Trace result }
  /diff:
    post:
      summary: Diff two workbooks
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [fileA, fileB]
              properties:
                fileA: { type: string }
                fileB: { type: string }
      responses:
        '200': { description: Diff result }
  /export:
    post:
      summary: Export bytes
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [file, format]
              properties:
                file: { type: string }
                format: { type: string }
      responses:
        '200': { description: Binary or JSON depending on format }
